<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organiser Dashboard — Buzzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --accent: #e94560;
      --text: #eaeaea;
      --muted: #888;
      --green: #00d4aa;
      --amber: #f5a623;
      --blue:  #4a9eff;
      --grey:  #6b7280;
      --border: rgba(255,255,255,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      padding: 20px;
    }

    /* Login */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 20px;
    }

    .login-card {
      background: var(--card);
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .logo { font-size: 52px; margin-bottom: 12px; }
    h1 { font-size: 1.7rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 1.2rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 6px;
    }

    input[type="password"]:focus { border-color: var(--accent); }
    input::placeholder { letter-spacing: 0; color: var(--muted); font-size: 1rem; }
    .error-msg { color: var(--accent); font-size: 0.88rem; margin-bottom: 10px; min-height: 20px; }

    button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    /* Dashboard */
    #dashboard { display: none; }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .top-bar h2 { font-size: 1.4rem; font-weight: 700; }

    .conn-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.3);
      border-radius: 50px;
      padding: 5px 12px;
      font-size: 0.8rem;
      color: var(--green);
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Top grid: QR + Buzz All */
    .top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 640px) { .top-grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
    }

    .panel-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    /* QR */
    .qr-wrap { text-align: center; }

    #qrImg {
      width: 180px; height: 180px;
      border-radius: 10px;
      background: #fff;
      padding: 6px;
      margin: 0 auto 10px;
      display: block;
    }

    .join-url {
      font-size: 0.78rem;
      color: var(--muted);
      word-break: break-all;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 7px 10px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 4px;
    }

    .join-url:hover { background: rgba(255,255,255,0.08); }
    .copy-hint { font-size: 0.72rem; color: var(--muted); }

    /* Buzz all */
    .buzz-all-btn {
      background: var(--accent);
      border-radius: 12px;
      padding: 18px;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(233,69,96,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 12px;
    }

    .buzz-all-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(233,69,96,0.5); }
    .buzz-all-btn:active { transform: scale(0.97); }
    .buzz-all-btn.fired { animation: buzzFlash 0.2s ease 3 alternate; }

    @keyframes buzzFlash {
      from { background: var(--accent); }
      to   { background: #ff7096; }
    }

    .buzz-all-note {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }

    /* Response Feed */
    #feed-panel { margin-bottom: 16px; }

    .feed-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 220px;
      overflow-y: auto;
    }

    .feed-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 10px 14px;
      border-left: 3px solid transparent;
      animation: slideIn 0.3s ease-out;
    }

    .feed-item.coming  { border-left-color: var(--green); }
    .feed-item.declined{ border-left-color: var(--accent); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .feed-emoji { font-size: 1.4rem; flex-shrink: 0; }

    .feed-info { flex: 1; min-width: 0; }

    .feed-name {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-status {
      font-size: 0.78rem;
      margin-top: 1px;
    }

    .feed-status.coming  { color: var(--green); }
    .feed-status.declined{ color: var(--accent); }

    .feed-time { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }

    .feed-empty {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    /* Participant sections */
    #participants-panel { }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      margin-top: 18px;
    }

    .section-header:first-child { margin-top: 0; }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .section-label.available  { color: var(--text); }
    .section-label.coming     { color: var(--green); }
    .section-label.checkedin  { color: var(--blue); }
    .section-label.done       { color: var(--grey); }
    .section-label.declined   { color: var(--accent); }

    .section-count {
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 50px;
      padding: 1px 8px;
    }

    .section-count.available  { background: rgba(255,255,255,0.08); color: var(--muted); }
    .section-count.coming     { background: rgba(0,212,170,0.15);   color: var(--green); }
    .section-count.checkedin  { background: rgba(74,158,255,0.15);  color: var(--blue); }
    .section-count.done       { background: rgba(107,114,128,0.2);  color: var(--grey); }
    .section-count.declined   { background: rgba(233,69,96,0.15);   color: var(--accent); }

    .section-divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .p-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 4px;
    }

    .p-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      transition: opacity 0.2s;
      animation: slideIn 0.25s ease-out;
    }

    .p-item.offline { opacity: 0.45; }
    .p-item.coming    { border-color: rgba(0,212,170,0.2);  background: rgba(0,212,170,0.05); }
    .p-item.checkedin { border-color: rgba(74,158,255,0.25);background: rgba(74,158,255,0.07); }
    .p-item.done      { border-color: rgba(107,114,128,0.2);background: rgba(107,114,128,0.05); opacity: 0.7; }
    .p-item.declined  { border-color: rgba(233,69,96,0.2);  background: rgba(233,69,96,0.05); }

    .p-item.buzzed-flash { animation: itemFlash 0.15s ease 4 alternate; }

    @keyframes itemFlash {
      from { background: rgba(255,255,255,0.04); border-color: var(--border); }
      to   { background: rgba(233,69,96,0.2);   border-color: var(--accent); }
    }

    .avatar {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0f3460, #1a4a8a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.4rem;
      color: #fff;
      flex-shrink: 0;
      position: relative;
      letter-spacing: -1px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .avatar .num-prefix {
      font-size: 0.7rem;
      opacity: 0.6;
      font-weight: 600;
      margin-right: 1px;
    }

    .online-dot {
      position: absolute;
      bottom: 0; right: 0;
      width: 9px; height: 9px;
      border-radius: 50%;
      border: 2px solid var(--card);
    }

    .online-dot.on  { background: var(--green); }
    .online-dot.off { background: #444; }

    .p-info { flex: 1; min-width: 0; }

    .p-name {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .p-meta { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    .p-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* Mobile: stack info above actions; let action buttons span the row */
    @media (max-width: 560px) {
      .p-item {
        flex-wrap: wrap;
        row-gap: 10px;
      }
      .p-info { flex-basis: calc(100% - 70px); }
      .p-actions {
        flex-basis: 100%;
        justify-content: flex-start;
        gap: 6px;
      }
      .buzz-btn, .checkin-btn, .done-btn {
        flex: 1 1 auto;
        padding: 10px 12px;
        font-size: 0.88rem;
      }
      .delete-btn {
        flex: 0 0 auto;
        padding: 9px 11px;
        font-size: 0.85rem;
      }
      .reset-btn { padding: 9px 10px; }
      .status-badge { flex: 0 0 auto; }
    }

    .status-badge {
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 50px;
      padding: 3px 9px;
    }

    .status-badge.coming    { background: rgba(0,212,170,0.15); color: var(--green);  border: 1px solid rgba(0,212,170,0.3); }
    .status-badge.checkedin { background: rgba(74,158,255,0.15); color: var(--blue);  border: 1px solid rgba(74,158,255,0.3); }
    .status-badge.done      { background: rgba(107,114,128,0.2); color: var(--grey);  border: 1px solid rgba(107,114,128,0.3); }
    .status-badge.declined  { background: rgba(233,69,96,0.15); color: var(--accent); border: 1px solid rgba(233,69,96,0.3); }

    .checkin-btn {
      background: var(--blue);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 0.88rem;
      font-weight: 800;
      width: auto;
      box-shadow: 0 2px 10px rgba(74,158,255,0.35);
    }
    .checkin-btn:hover { background: #6bb1ff; box-shadow: 0 3px 14px rgba(74,158,255,0.5); }
    .checkin-btn:active { transform: scale(0.96); }

    .done-btn {
      background: var(--grey);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 0.88rem;
      font-weight: 800;
      width: auto;
      box-shadow: 0 2px 10px rgba(107,114,128,0.3);
    }
    .done-btn:hover { background: #8b95a3; }
    .done-btn:active { transform: scale(0.96); }

    .buzz-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 800;
      width: auto;
      box-shadow: 0 2px 10px rgba(233,69,96,0.35);
      letter-spacing: 0.3px;
    }

    .buzz-btn:hover { background: #ff5572; box-shadow: 0 3px 14px rgba(233,69,96,0.5); }
    .buzz-btn:active { transform: scale(0.96); }

    .reset-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.75rem;
      font-weight: 500;
      width: auto;
    }

    .reset-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .delete-btn {
      background: rgba(233,69,96,0.15);
      border: 1px solid rgba(233,69,96,0.5);
      color: var(--accent);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 1rem;
      font-weight: 700;
      width: auto;
      line-height: 1;
    }
    .delete-btn:hover { background: var(--accent); color: #fff; }
    .delete-btn:active { transform: scale(0.96); }

    .counts-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .count-chip {
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: 50px;
      padding: 3px 12px;
      border: 1px solid;
    }

    .count-chip.total     { border-color: var(--border);              color: var(--muted);  background: rgba(255,255,255,0.04); }
    .count-chip.online    { border-color: rgba(0,212,170,0.3);        color: var(--green);  background: rgba(0,212,170,0.1); }
    .count-chip.coming    { border-color: rgba(0,212,170,0.3);        color: var(--green);  background: rgba(0,212,170,0.08); }
    .count-chip.checkedin { border-color: rgba(74,158,255,0.3);       color: var(--blue);   background: rgba(74,158,255,0.08); }
    .count-chip.done      { border-color: rgba(107,114,128,0.3);      color: var(--grey);   background: rgba(107,114,128,0.1); }
    .count-chip.declined  { border-color: rgba(233,69,96,0.3);        color: var(--accent); background: rgba(233,69,96,0.08); }

    .empty-section {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 8px 4px;
      font-style: italic;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <div class="logo">📳</div>
      <h1>Organiser Login</h1>
      <p class="subtitle">Enter your PIN to access the dashboard</p>
      <input type="password" id="pinInput" placeholder="Enter PIN" maxlength="10" autocomplete="off" autofocus />
      <p class="error-msg" id="errorMsg"></p>
      <button onclick="login()">Enter Dashboard</button>
    </div>
  </div>

  <div id="dashboard">

    <div class="top-bar">
      <h2>📳 Buzzer Dashboard</h2>
      <div class="conn-chip">
        <span class="live-dot"></span>
        <span id="connLabel">Live</span>
      </div>
    </div>

    <!-- QR + Buzz All -->
    <div class="top-grid">
      <div class="panel qr-wrap">
        <div class="panel-title">Scan to Join</div>
        <img id="qrImg" src="" alt="Loading…" />
        <div class="join-url" id="joinUrl" onclick="copyUrl()">Loading…</div>
        <div class="copy-hint">Tap to copy link</div>
      </div>

      <div class="panel" style="display:flex;flex-direction:column;justify-content:center;">
        <div class="panel-title">Quick Actions</div>
        <button class="buzz-all-btn" id="buzzAllBtn" onclick="buzzAll()">
          📳 BUZZ EVERYONE
        </button>
        <div class="buzz-all-note">Only buzzes participants who haven't responded yet</div>
      </div>
    </div>

    <!-- Response feed -->
    <div class="panel" id="feed-panel" style="margin-bottom:16px;">
      <div class="panel-title">Live Responses</div>
      <div class="feed-list" id="feedList">
        <div class="feed-empty">Responses will appear here when participants reply to a buzz.</div>
      </div>
    </div>

    <!-- Participants -->
    <div class="panel" id="participants-panel">
      <div class="panel-title">Participants</div>
      <div class="counts-row" id="countsRow"></div>
      <div id="participantSections"></div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let participants = [];
    let joinUrl = '';
    let authorized = false;
    const responseFeed = []; // { name, status, token, time }

    document.getElementById('pinInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function login() {
      const pin = document.getElementById('pinInput').value.trim();
      if (!pin) return;
      sessionStorage.setItem('bzpin', pin);
      socket.emit('join-organizer', { pin });
    }

    socket.on('auth-ok', () => {
      authorized = true;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadQR();
    });

    socket.on('auth-error', msg => {
      document.getElementById('errorMsg').textContent = msg || 'Invalid PIN';
      document.getElementById('pinInput').value = '';
      document.getElementById('pinInput').focus();
    });

    socket.on('connect', () => {
      document.getElementById('connLabel').textContent = 'Live';
      if (authorized) {
        const pin = sessionStorage.getItem('bzpin');
        if (pin) socket.emit('join-organizer', { pin });
      }
    });

    socket.on('disconnect', () => {
      document.getElementById('connLabel').textContent = 'Reconnecting…';
    });

    socket.on('participants-update', list => {
      participants = list;
      renderParticipants();
    });

    socket.on('buzz-response-received', ({ name, status, token, time }) => {
      responseFeed.unshift({ name, status, token, time: new Date(time) });
      if (responseFeed.length > 20) responseFeed.pop();
      renderFeed();
    });

    socket.on('buzz-sent', ({ targetToken }) => {
      if (targetToken === 'all') {
        document.querySelectorAll('.p-item').forEach(el => flashItem(el));
      } else {
        const el = document.getElementById(`pitem-${targetToken}`);
        if (el) flashItem(el);
      }
    });

    function flashItem(el) {
      el.classList.add('buzzed-flash');
      setTimeout(() => el.classList.remove('buzzed-flash'), 800);
    }

    async function loadQR() {
      try {
        const res  = await fetch('/qr');
        const data = await res.json();
        document.getElementById('qrImg').src = data.qr;
        joinUrl = data.url;
        document.getElementById('joinUrl').textContent = data.url;
      } catch {
        document.getElementById('qrImg').alt = 'Failed to load QR';
      }
    }

    function copyUrl() {
      if (!joinUrl) return;
      navigator.clipboard.writeText(joinUrl).then(() => {
        const el = document.getElementById('joinUrl');
        const orig = el.textContent;
        el.textContent = '✓ Copied!';
        setTimeout(() => { el.textContent = orig; }, 1500);
      });
    }

    function buzzAll() {
      socket.emit('buzz', { targetToken: 'all' });
      const btn = document.getElementById('buzzAllBtn');
      btn.classList.add('fired');
      setTimeout(() => btn.classList.remove('fired'), 600);
    }

    function buzzOne(token) {
      socket.emit('buzz', { targetToken: token });
    }

    function resetStatus(token) {
      socket.emit('reset-status', { token });
    }

    function setStatus(token, status) {
      socket.emit('organizer-set-status', { token, status });
    }

    function deleteParticipant(token, name) {
      if (!confirm(`Remove ${name} from the queue? This cannot be undone.`)) return;
      socket.emit('delete-participant', { token });
    }

    // --- Feed ---
    function renderFeed() {
      const list = document.getElementById('feedList');
      if (responseFeed.length === 0) {
        list.innerHTML = '<div class="feed-empty">Responses will appear here when participants reply to a buzz.</div>';
        return;
      }
      list.innerHTML = responseFeed.map(r => {
        const emoji  = r.status === 'coming' ? '✅' : '❌';
        const label  = r.status === 'coming' ? 'I am coming' : 'I decided not to go';
        return `
          <div class="feed-item ${r.status}">
            <span class="feed-emoji">${emoji}</span>
            <div class="feed-info">
              <div class="feed-name">${escHtml(r.name)}</div>
              <div class="feed-status ${r.status}">${label}</div>
            </div>
            <span class="feed-time">${formatTime(r.time)}</span>
          </div>`;
      }).join('');
    }

    // --- Participants ---
    function renderParticipants() {
      const available = participants.filter(p => p.status === 'pending');
      const coming    = participants.filter(p => p.status === 'coming');
      const checkedin = participants.filter(p => p.status === 'checked-in');
      const done      = participants.filter(p => p.status === 'done');
      const declined  = participants.filter(p => p.status === 'declined');

      const onlineCount = participants.filter(p => p.online).length;

      // Counts row
      document.getElementById('countsRow').innerHTML = `
        <span class="count-chip total">${participants.length} total</span>
        <span class="count-chip online">${onlineCount} online</span>
        <span class="count-chip coming">✅ ${coming.length} coming</span>
        <span class="count-chip checkedin">🎟 ${checkedin.length} checked-in</span>
        <span class="count-chip done">✔ ${done.length} done</span>
        <span class="count-chip declined">❌ ${declined.length} declined</span>
      `;

      const sections = document.getElementById('participantSections');

      if (participants.length === 0) {
        sections.innerHTML = `
          <div class="empty-state">
            <div class="icon">📱</div>
            <p>No participants yet.<br>Share the QR code to get started.</p>
          </div>`;
        return;
      }

      sections.innerHTML = `
        ${renderSection('Available', 'available', available)}
        ${renderSection('Coming', 'coming', coming)}
        ${renderSection('Checked-in', 'checkedin', checkedin)}
        ${renderSection('Done', 'done', done)}
        ${renderSection('Declined', 'declined', declined)}
      `;
    }

    function renderSection(label, cls, list) {
      const emoji = ({
        coming:    '✅',
        checkedin: '🎟',
        done:      '✔',
        declined:  '❌',
      })[cls] || '📋';
      let sorted;
      if (cls === 'coming' || cls === 'checkedin') {
        // Sort by status-change time (queue order)
        sorted = [...list].sort((a, b) => new Date(a.statusUpdatedAt) - new Date(b.statusUpdatedAt));
      } else {
        // Sort: online first
        sorted = [...list].sort((a, b) => (a.online === b.online) ? 0 : a.online ? -1 : 1);
      }

      return `
        <div class="section-header">
          <span class="section-label ${cls}">${emoji} ${label}</span>
          <span class="section-count ${cls}">${list.length}</span>
          <span class="section-divider"></span>
        </div>
        <div class="p-list">
          ${sorted.length === 0
            ? `<div class="empty-section">None yet</div>`
            : sorted.map((p, i) => renderParticipant(p, cls, (cls === 'coming' || cls === 'checkedin') ? i + 1 : null)).join('')
          }
        </div>
      `;
    }

    function renderParticipant(p, sectionCls, queuePos) {
      const safeToken = escAttr(p.token);

      const queueBadge = (queuePos != null && (sectionCls === 'coming' || sectionCls === 'checkedin'))
        ? `<span style="font-size:0.78rem;font-weight:800;background:${sectionCls === 'coming' ? 'var(--green)' : 'var(--blue)'};color:#0f0f1a;border-radius:50px;padding:4px 10px;margin-right:6px;">${sectionCls === 'coming' ? 'QUEUE ' : 'IN '}${queuePos}</span>`
        : '';

      const numberDisplay = p.number
        ? `<span class="num-prefix">#</span>${p.number}`
        : '?';

      const deleteButton = `<button class="delete-btn" onclick="deleteParticipant('${safeToken}', '${escHtml(p.name).replace(/'/g, '&#39;')}')" title="Remove from queue">🗑 Delete</button>`;
      const resetButton  = `<button class="reset-btn" onclick="resetStatus('${safeToken}')" title="Move back to Available">↩</button>`;

      let actionButtons;
      if (sectionCls === 'available') {
        actionButtons = `
          <button class="buzz-btn" onclick="buzzOne('${safeToken}')" title="${p.online ? 'Send buzz (in-app)' : 'Send buzz (push notification only)'}">
            📳 BUZZ
          </button>
          <button class="checkin-btn" onclick="setStatus('${safeToken}', 'checked-in')" title="Skip buzz, mark as checked-in">
            🎟 Check-in
          </button>
          ${deleteButton}`;
      } else if (sectionCls === 'coming') {
        actionButtons = `
          ${queueBadge}
          <button class="checkin-btn" onclick="setStatus('${safeToken}', 'checked-in')" title="Mark as arrived">
            🎟 Check-in
          </button>
          ${resetButton}
          ${deleteButton}`;
      } else if (sectionCls === 'checkedin') {
        actionButtons = `
          ${queueBadge}
          <button class="done-btn" onclick="setStatus('${safeToken}', 'done')" title="Mark as complete">
            ✔ Done
          </button>
          ${resetButton}
          ${deleteButton}`;
      } else if (sectionCls === 'done') {
        actionButtons = `
          <span class="status-badge done">✔ Done</span>
          ${resetButton}
          ${deleteButton}`;
      } else {
        // declined
        actionButtons = `
          <span class="status-badge declined">❌ Declined</span>
          ${resetButton}
          ${deleteButton}`;
      }

      const itemCls = sectionCls === 'available' ? '' : sectionCls;

      return `
        <div class="p-item ${itemCls} ${p.online ? '' : 'offline'}" id="pitem-${safeToken}">
          <div class="avatar" title="Serial number">
            ${numberDisplay}
            <span class="online-dot ${p.online ? 'on' : 'off'}"></span>
          </div>
          <div class="p-info">
            <div class="p-name">${escHtml(p.name)}</div>
            <div class="p-meta">${escHtml(p.mobile)} · ${p.online ? 'Online' : 'Offline'}</div>
          </div>
          <div class="p-actions">${actionButtons}</div>
        </div>`;
    }

    function formatTime(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function escHtml(str) {
      return String(str).replace(/[&<>"']/g, c =>
        ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])
      );
    }

    function escAttr(str) {
      return String(str).replace(/[^a-f0-9]/gi, '');
    }
  </script>
</body>
</html>
